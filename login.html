<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập tài khoản - Crusshy</title>
    <link rel="stylesheet" href="dang_ky.css">
</head>
<body>
    <div class="container">
        <h1>ĐĂNG NHẬP</h1>
        <p>Tiếp tục hành trình kết nối của bạn</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email / Số điện thoại</label>
                <input type="text" id="email" name="email" placeholder="Nhập email hoặc số điện thoại" required>
            </div>
            
            <div class="form-group">
                <!-- Tách dòng để tối ưu layout Quên mật khẩu nằm ngang hàng label -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                    <label for="password" style="margin-bottom: 0;">Mật khẩu</label>
                    <a href="#" style="font-size: 12px; font-weight: normal; color: #666;">Quên mật khẩu?</a>
                </div>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Ghi nhớ mật khẩu</label>
            </div>

            <button type="button" class="btn-google">
                <img src="https://developers.google.com/static/identity/images/g-logo.png" alt="Google Logo" style="width:16px; margin-right:8px; vertical-align:middle;">
                Đăng nhập bằng Google
            </button>

            <button type="submit" class="btn-register">ĐĂNG NHẬP</button>
        </form>
        <div class="footer-link">Chưa có tài khoản? <a href="#">Đăng ký tại đây</a></div>
    </div>
</body>
</html>
